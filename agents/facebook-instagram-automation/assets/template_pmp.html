<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMP Question of the Day</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif !important;
        }
        body {
            background-color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .capture-area {
            width: 1280px; 
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        /* UNIFIED FONT SIZE: 24px for all main text components */
        .text-scenario { font-size: 24px; line-height: 1.6; color: #334155; }
        .text-question { font-size: 24px; font-weight: 800; color: #0f172a; line-height: 1.4; }
        .option-text { font-size: 24px; font-weight: 600; line-height: 1.4; }
        .explanation-body { font-size: 24px; line-height: 1.6; color: #475569; }
        .hidden { display: none !important; }

        /* Specific fix for Labels */
        .option-label { font-size: 24px; font-weight: 800; }
    </style>
</head>
<body>

    <!-- Capture this specific div for the Facebook Image -->
    <div id="pmp-card" class="capture-area rounded-2xl relative border border-slate-200">
        
        <!-- Header Banner -->
        <div class="bg-indigo-600 px-10 py-6 text-white flex items-center justify-between">
            <div class="flex items-center gap-4">
                
                <!-- Khu vực Logo tích hợp cả Ảnh thật và Logo vẽ lại -->
                <div class="w-14 h-14 relative shrink-0">
                    <div class="w-full h-full bg-[#429dec] rounded-xl flex flex-col items-center justify-center shadow-sm z-0">
                        <svg class="w-[30px] h-[30px] mt-0.5" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path fill="#ffffff" d="M495.9 166.6c3.2 8.7 .5 18.4-6.4 24.6l-43.3 39.4c1.1 8.3 1.7 16.8 1.7 25.4s-.6 17.1-1.7 25.4l43.3 39.4c6.9 6.2 9.6 15.9 6.4 24.6c-4.4 11.9-9.7 23.3-15.8 34.3l-4.7 8.1c-6.6 11-14 21.4-22.1 31.2c-5.9 7.2-15.7 9.6-24.5 6.8l-55.7-17.7c-13.4 10.3-28.2 18.9-44 25.4l-12.5 57.1c-2 9.1-9 16.3-18.2 17.8c-13.8 2.3-28 3.5-42.5 3.5s-28.7-1.2-42.5-3.5c-9.2-1.5-16.2-8.7-18.2-17.8l-12.5-57.1c-15.8-6.5-30.6-15.1-44-25.4L83.1 425.9c-8.8 2.8-18.6 .3-24.5-6.8c-8.1-9.8-15.5-20.2-22.1-31.2l-4.7-8.1c-6.1-11-11.4-22.4-15.8-34.3c-3.2-8.7-.5-18.4 6.4-24.6l43.3-39.4C64.6 273.1 64 264.6 64 256s.6-17.1 1.7-25.4L22.4 191.2c-6.9-6.2-9.6-15.9-6.4-24.6c4.4-11.9 9.7-23.3 15.8-34.3l4.7-8.1c6.6-11 14-21.4 22.1-31.2c5.9-7.2 15.7-9.6 24.5-6.8l55.7 17.7c13.4-10.3 28.2-18.9 44-25.4l12.5-57.1c2-9.1 9-16.3 18.2-17.8C227.3 1.2 241.5 0 256 0s28.7 1.2 42.5 3.5c9.2 1.5 16.2 8.7 18.2 17.8l12.5 57.1c15.8 6.5 30.6 15.1 44 25.4l55.7-17.7c8.8-2.8 18.6-.3 24.5 6.8c8.1 9.8 15.5 20.2 22.1 31.2l4.7 8.1c6.1 11 11.4 22.4 15.8 34.3z"/>
                            <circle cx="256" cy="256" r="130" fill="#429dec" />
                            <g transform="translate(150, 160) scale(0.48)">
                                <path fill="#ffffff" d="M224 256A128 128 0 1 0 224 0a128 128 0 1 0 0 256zm94.8-39.2c-2.4-4.7-8.8-5.9-12.9-2.2l-37 33.3-13.3-43.4c-1.5-4.8-6.6-7.6-11.5-6.5L224 202l-20.1-4-4.8-1-4.8-1c-4.9-1-10 1.8-11.5 6.5l-13.3 43.4-37-33.3c-4.1-3.7-10.5-2.5-12.9 2.2l-18.4 36.8C43.1 268 0 327.5 0 400v24c0 48.6 39.4 88 88 88h272c48.6 0 88-39.4 88-88V400c0-72.5-43.1-132-101.3-147.7l-18.4-36.8zM245.9 365.5l19.5-65.1c1.3-4.3-1.6-8.6-6-8.8l-35.3-1.4c-4.5-.2-7.6 4.3-6.5 8.7l17.4 67.2c1.4 5.4 9 5.8 10.9 .4z"/>
                            </g>
                        </svg>
                        <div class="text-[11px] font-black leading-none tracking-wide text-white mt-1">PMP</div>
                    </div>
                    <img src="pmp_logo.png" alt="PMP Logo" class="absolute inset-0 w-14 h-14 rounded-xl shadow-sm object-cover z-10" onerror="this.style.display='none'">
                </div>

                <div>
                    <h1 class="text-2xl font-bold tracking-wide">PMP by ABC E-learning</h1>
                    <p class="text-indigo-200 text-sm font-medium" id="domain-text">Domain I: People.</p>
                </div>
            </div>
            <div class="bg-indigo-500/50 px-4 py-2 rounded-lg backdrop-blur-sm border border-indigo-400/50 text-sm font-semibold" id="topic-text">
                Maslow's Hierarchy of Needs
            </div>
        </div>

        <div class="p-10 text-slate-700 grid grid-cols-12 gap-10 items-start">
            <div class="col-span-7 flex flex-col h-full">
                <div class="mb-6">
                    <div class="text-scenario mb-4" id="scenario-content">
                        Scenario text
                    </div>
                    <div class="text-question border-l-4 border-indigo-500 pl-4 py-1" id="question-content">
                        Question text
                    </div>
                </div>
                <div class="space-y-3 mt-auto" id="options-container"></div>
            </div>

            <div class="col-span-5 bg-slate-100 rounded-xl p-6 border border-slate-200 h-full flex flex-col gap-4">
                <div>
                    <div class="flex items-center gap-2 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                        </svg>
                        <h3 class="text-xl font-bold text-indigo-900">Explanation</h3>
                    </div>
                    <div class="explanation-body" id="explanation-content">
                        Explanation...
                    </div>
                </div>

                <div class="flex flex-col gap-4">
                    <div id="list-area" class="bg-white p-4 rounded-lg border border-slate-200 hidden">
                        <strong class="text-sm" id="list-title">The 5 sets of needs:</strong>
                        <ol class="list-decimal pl-5 mt-2 space-y-1 text-slate-600 font-medium text-sm" id="data-list"></ol>
                    </div>
                    <div id="reference-area" class="bg-indigo-100 p-4 rounded-lg text-slate-600 italic border-l-8 border-indigo-500 hidden shadow-sm">
                        <b class="text-indigo-800">📖 Exam Reference:</b><br><br>
                        <span id="reference-content">Reference...</span>
                        <div class="text-xs mt-3 text-slate-400 not-italic font-medium" id="reference-source">— PMI Learning Library</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.setData = (data) => {
            document.getElementById('domain-text').innerText = data.domain || 'Domain I: People';
            document.getElementById('topic-text').innerText = data.topic || 'PMP Quiz';
            document.getElementById('scenario-content').innerHTML = data.scenario;
            document.getElementById('question-content').innerHTML = data.question;
            document.getElementById('explanation-content').innerHTML = data.explanation;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            const labels = ['A', 'B', 'C', 'D'];
            const correctIndices = Array.isArray(data.correct_indices) ? data.correct_indices : 
                                 (data.correct_index !== undefined ? [data.correct_index] : []);

            data.options.forEach((opt, index) => {
                const isCorrect = correctIndices.includes(index);
                const div = document.createElement('div');
                if (isCorrect) {
                    div.className = "bg-green-50 border-2 border-green-500 p-4 rounded-xl text-base flex items-center justify-between shadow-sm";
                    div.innerHTML = `<div class="flex items-start gap-3 pr-4"><div class="option-label text-green-700 mt-0.5">${labels[index]}.</div><div class="option-text text-green-900">${opt}</div></div><div class="text-green-600 bg-green-100 w-7 h-7 rounded-full shrink-0 flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg></div>`;
                } else {
                    div.className = "bg-white border border-slate-300 p-4 rounded-xl text-base flex items-start gap-3 transition-all";
                    div.innerHTML = `<div class="option-label text-slate-400 mt-0.5">${labels[index]}.</div><div class="option-text">${opt}</div>`;
                }
                optionsContainer.appendChild(div);
            });

            const listArea = document.getElementById('list-area');
            const refArea = document.getElementById('reference-area');
            if (data.list && data.list.items && data.list.items.length > 0) {
                listArea.classList.remove('hidden');
                document.getElementById('list-title').innerText = data.list.title || 'Key Points:';
                document.getElementById('data-list').innerHTML = data.list.items.map(i => `<li>${i}</li>`).join('');
            } else { listArea.classList.add('hidden'); }
            
            if (data.reference) {
                refArea.classList.remove('hidden');
                document.getElementById('reference-content').innerHTML = data.reference;
                document.getElementById('reference-source').innerText = '— ' + (data.refSource || 'PMI Guide');
            } else { refArea.classList.add('hidden'); }
        };
    </script>
</body>
</html>
